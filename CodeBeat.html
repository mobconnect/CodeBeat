<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBeat</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .play-button {
            background-color: #ff00ff;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        /* Add more styles for black/pink/green theme as needed */
        .green-theme {
            background-color: #008000;
        }
        .pink-theme {
            background-color: #ff69b4;
        }
    </style>
</head>
<body>
    <h1>Welcome to CodeBeat!</h1>
    <button class="play-button" onclick="playAudio()">PLAY</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.33/Tone.js"></script>
    <script>
        let synth = new Tone.Synth().toDestination();
        let isPlaying = false;

        function playAudio() {
            if (isPlaying) return;
            isPlaying = true;
            synth.triggerAttackRelease('C4', '8n'); // Example note
            setTimeout(() => {
                isPlaying = false;
            }, 500);
        }
    </script>
</body>
</html>
